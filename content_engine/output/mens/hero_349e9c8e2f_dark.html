<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1440px;background:#F0FFF4;font-family:'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;overflow:hidden;position:relative}
.gradient-bar{position:absolute;top:0;left:0;right:0;height:12px;background:linear-gradient(135deg, #07C160 0%, #059B48 100%)}
.content{padding:80px 60px;height:100%;display:flex;flex-direction:column;justify-content:center}
.tag{display:inline-block;background:#07C160;color:#fff;font-size:18px;padding:8px 24px;border-radius:30px;font-weight:600;margin-bottom:40px;letter-spacing:1px}
.emoji-big{font-size:80px;margin-bottom:30px}
.hook{font-size:48px;font-weight:800;color:#1a1a1a;line-height:1.4;margin-bottom:40px;letter-spacing:1px}
.hook::first-line{color:#07C160}
.divider{width:80px;height:6px;background:linear-gradient(135deg, #07C160 0%, #059B48 100%);border-radius:3px;margin-bottom:30px}
.product-name{font-size:28px;color:#666666;font-weight:500;margin-bottom:20px}
.style-badge{display:inline-block;border:2px solid #07C160;color:#07C160;font-size:16px;padding:6px 18px;border-radius:20px;font-weight:500}
.brand{position:absolute;bottom:60px;left:60px;right:60px;display:flex;justify-content:space-between;align-items:center}
.brand-name{font-size:24px;font-weight:700;color:#07C160}
.brand-slogan{font-size:16px;color:#666666}
.watermark{position:absolute;bottom:60px;right:60px;font-size:14px;color:#666666;opacity:0.5}
.corner-deco{position:absolute;top:0;right:0;width:200px;height:200px;background:linear-gradient(135deg, #07C160 0%, #059B48 100%);opacity:0.06;border-radius:0 0 0 200px}
.corner-deco-2{position:absolute;bottom:0;left:0;width:300px;height:300px;background:linear-gradient(135deg, #07C160 0%, #059B48 100%);opacity:0.04;border-radius:0 300px 0 0}
</style></head><body>
<div class="gradient-bar"></div>
<div class="corner-deco"></div>
<div class="corner-deco-2"></div>
<div class="content">
  <span class="tag">💪 男性健康</span>
  <div class="emoji-big">💪</div>
  <div class="hook">手把手教你工作效率翻倍，小白也能学会</div>
  <div class="divider"></div>
  <div class="product-name">MediSlim · AI驱动的消费医疗平台</div>
  <span class="style-badge">种草体</span>
</div>
<div class="brand">
  <div><div class="brand-name">MediSlim</div><div class="brand-slogan">AI健康管家 · 足不出户享受专业医疗</div></div>
</div>
</body></html>
